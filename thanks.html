<!DOCTYPE html>
<html lang="ja" class="scroll-smooth">
<head>

    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- FontAwesome -->
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">

    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@300;400;500;700&family=Noto+Serif+JP:wght@400;600;700&display=swap" rel="stylesheet">
    <!-- Tailwind Config -->
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: {
                        sans: ['"Noto Sans JP"', 'sans-serif'],
                        serif: ['"Noto Serif JP"', 'serif'],

                    colors: {
                        primary: '#1e293b',

                        accent: '#c5a059', 
                        accentHover: '#a38343',

            <a href="index.html" class="inline-block px-8 py-3 bg-primary hover:bg-secondary text-white font-medium rounded transition duration-300">
